version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: vagaai_mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: career_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vagaai-network

  backend:
    build: ./backend
    container_name: vagaai_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=mysql://user:password@mariadb:3306/career_db
    networks:
      - vagaai-network

  worker:
    build: ./worker
    container_name: vagaai_worker
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    # Pode criar o arquivo .env dentro da pasta worker para chaves de API
    env_file:
      - ./worker/.env
    environment:
      - DB_HOST=mariadb
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=career_db
    networks:
      - vagaai-network

volumes:
  mariadb_data:

networks:
  vagaai-network:
    driver: bridge